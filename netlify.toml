# 1. Define your Build Settings (Optional, but good practice)
[build]
  # Specify the command to run to generate your site (e.g., 'npm run build')
  command = "npm run build"
  # Specify the directory that contains the final static files (e.g., 'build' or 'dist')
  publish = "build"

# 2. Define the Redirect/Proxy Rule
[[redirects]]
  # This is the path your React app will call (securely via HTTPS)
  from = "/api/*"
  # This is the insecure HTTP API Netlify will call internally
  to = "http://expensetracker-env.eba-hgtp6fbu.eu-north-1.elasticbeanstalk.com/:splat"
  # The status code 200 tells Netlify to act as a proxy (rewrite)
  status = 200

# 3. Handle Client-Side Routing (Crucial for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200